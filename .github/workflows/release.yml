name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path src-tauri/binaries -Force | Out-Null
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $exe = Get-ChildItem ffmpeg_extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri/binaries/ffmpeg.exe" -Force
          Write-Host "ffmpeg.exe downloaded: $((Get-Item src-tauri/binaries/ffmpeg.exe).Length) bytes"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RainySteamRecord ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false