name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path src-tauri/binaries -Force | Out-Null
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $exe = Get-ChildItem ffmpeg_extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri/binaries/ffmpeg.exe" -Force
          Write-Host "ffmpeg.exe downloaded: $((Get-Item src-tauri/binaries/ffmpeg.exe).Length) bytes"

      - name: Download mpv
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '^mpv-x86_64-[^-]+-git-[^.]+\.7z$' } | Select-Object -First 1
          if (-not $asset) { throw "Compatible mpv release asset not found" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv.7z -UseBasicParsing
          7z x mpv.7z -ompv_extract -y
          $mpv = Get-ChildItem mpv_extract -Recurse -Filter "mpv.exe" | Select-Object -First 1
          $d3d = Get-ChildItem mpv_extract -Recurse -Filter "d3dcompiler_43.dll" | Select-Object -First 1
          if (-not $mpv -or -not $d3d) { throw "Required mpv files not found in archive" }
          Copy-Item $mpv.FullName "src-tauri/binaries/mpv.exe" -Force
          Copy-Item $d3d.FullName "src-tauri/binaries/d3dcompiler_43.dll" -Force

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RainySteamRecord ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
