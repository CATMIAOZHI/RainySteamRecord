name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check versions
        run: npm run check:version

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Prepare resource placeholders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path src-tauri/binaries -Force | Out-Null
          New-Item -ItemType File -Path src-tauri/binaries/ffmpeg.exe -Force | Out-Null
          New-Item -ItemType File -Path src-tauri/binaries/mpv.exe -Force | Out-Null
          New-Item -ItemType File -Path src-tauri/binaries/d3dcompiler_43.dll -Force | Out-Null

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test
